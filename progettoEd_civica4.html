<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quanto sei al sicuro online?</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Syne',sans-serif;background:#0a0f1e;color:#e8edf8;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
    .survey-wrap{width:100%;max-width:700px;min-height:100vh;padding:2.5rem 1.5rem 4rem;position:relative}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,150,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,150,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

    .header{text-align:center;margin-bottom:2.5rem;position:relative;z-index:2}
    .badge-pill{display:inline-block;font-family:'Space Mono',monospace;font-size:11px;color:#00c896;border:1px solid #00c896;padding:4px 14px;border-radius:20px;margin-bottom:1rem;letter-spacing:2px;text-transform:uppercase}
    h1{font-size:clamp(26px,5vw,40px);font-weight:800;line-height:1.15;margin-bottom:.7rem;color:#fff}
    h1 span{color:#00c896}
    .subtitle{font-size:15px;color:#7a8ba8;max-width:440px;margin:0 auto;line-height:1.65}

    .progress-bar-wrap{max-width:560px;margin:0 auto 2rem;position:relative;z-index:2}
    .progress-meta{display:flex;justify-content:space-between;font-size:12px;font-family:'Space Mono',monospace;color:#4a5e7a;margin-bottom:6px}
    .progress-track{height:4px;background:#1a2540;border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:#00c896;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

    .card{max-width:560px;margin:0 auto;background:#111827;border:1px solid #1e3a5f;border-radius:16px;padding:2rem;position:relative;z-index:2}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#00c896;border-radius:16px 16px 0 0}
    .q-number{font-family:'Space Mono',monospace;font-size:11px;color:#00c896;letter-spacing:2px;text-transform:uppercase;margin-bottom:.75rem}
    .q-icon{font-size:30px;margin-bottom:1rem}
    .q-text{font-size:18px;font-weight:600;line-height:1.45;margin-bottom:1.5rem;color:#e8edf8}
    .options{display:flex;flex-direction:column;gap:10px}
    .opt{background:#0d1526;border:1px solid #1e3a5f;border-radius:10px;padding:.85rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;font-size:14px;color:#c0cee0;font-weight:500}
    .opt:hover{border-color:#00c896;background:#0f2030;color:#fff}
    .opt.selected{border-color:#00c896;background:#001f1a;color:#00c896}

    .opt.selected .opt-letter{color:#00c896}
    .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.75rem}
    .btn{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s}
    .btn-back{background:transparent;border:1px solid #1e3a5f;color:#7a8ba8}
    .btn-back:hover{border-color:#4a5e7a;color:#c0cee0}
    .btn-next{background:#00c896;color:#001f1a}
    .btn-next:hover{background:#00e5ac}
    .btn-next:disabled{background:#1e3a5f;color:#4a5e7a;cursor:not-allowed}

    /* GAUGE */
    .gauge-wrap{max-width:300px;margin:0 auto .5rem}
    .gauge-svg{width:100%;display:block}
    .gauge-center-label{text-align:center;margin-bottom:1.25rem}
    .gauge-pct-num{font-family:'Space Mono',monospace;font-size:38px;font-weight:700;line-height:1}
    .gauge-level-label{font-size:12px;font-weight:700;margin-top:6px;letter-spacing:2px;text-transform:uppercase}

    .result-wrap{max-width:560px;margin:0 auto;position:relative;z-index:2}
    .result-card{background:#111827;border:1px solid #1e3a5f;border-radius:16px;padding:2rem;position:relative;margin-bottom:1.25rem}
    .result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0;background:var(--level-color,#00c896)}
    .result-desc{font-size:14px;color:#7a8ba8;text-align:center;line-height:1.65;margin:0 auto 1.75rem;max-width:420px}

    /* BADGES */

    /* RADAR */
    .radar-section{margin-bottom:1.25rem}

    /* ACCORDION */
    .accordion{border:1px solid #1e3a5f;border-radius:10px;overflow:hidden;margin-bottom:1.25rem}
    .accordion-trigger{width:100%;background:#0d1526;border:none;cursor:pointer;padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:#c0cee0;transition:background .2s}
    .accordion-trigger:hover{background:#0f2030}
    .accordion-trigger-left{display:flex;align-items:center;gap:10px}
    .acc-chevron{display:inline-block;width:14px;height:14px;border-right:2px solid #4a5e7a;border-bottom:2px solid #4a5e7a;transform:rotate(45deg);transition:transform .35s cubic-bezier(.4,0,.2,1);margin-right:2px}

    .accordion-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1);background:#0a1020}

    .accordion-inner{padding:1rem 1.1rem;display:flex;flex-direction:column;gap:10px}
    .breakdown-item{background:#0d1526;border:1px solid #1e3a5f;border-radius:8px;padding:.7rem .9rem}
    .breakdown-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#c0cee0}
    .breakdown-score-txt{font-family:'Space Mono',monospace;font-size:12px}
    .breakdown-bar-track{height:4px;background:#1a2540;border-radius:2px;overflow:hidden}
    .breakdown-bar-fill{height:100%;border-radius:2px;width:0;transition:width .8s cubic-bezier(.4,0,.2,1)}

    .tip-box{background:#001f1a;border:1px solid #00c896;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem}
    .tip-label{font-size:11px;font-family:'Space Mono',monospace;color:#00c896;letter-spacing:2px;text-transform:uppercase;margin-bottom:.4rem}
    .tip-text{font-size:13px;color:#a0c4b0;line-height:1.65}

    /* ACTION BUTTONS */
    .action-row{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
    .action-btn{flex:1;min-width:130px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:12px 10px;border-radius:10px;border:1px solid #1e3a5f;background:#0d1526;color:#c0cee0;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}

    .action-btn.primary{background:#00c896;color:#001f1a;border-color:#00c896}
    .action-btn.primary:hover{background:#00e5ac}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 24px;border-radius:40px;z-index:999;transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;white-space:nowrap}
    .toast.success{background:#00c896;color:#001f1a}
    .toast.error{background:#e24b4a;color:#fff}

    /* KASPERSKY */
    .kaspersky-box{background:#111827;border:1px solid #1e3a5f;border-radius:16px;padding:1.75rem;position:relative;z-index:2;text-align:center;margin-bottom:1.25rem}
    .kaspersky-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0;background:linear-gradient(90deg,#cc0000,#ff4444,#cc0000)}
    .kaspersky-header{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:.4rem}

    .kaspersky-title{font-size:14px;font-weight:700;color:#e8edf8;letter-spacing:1px;text-transform:uppercase}
    .kaspersky-sub{font-size:12px;color:#7a8ba8;margin-bottom:1.25rem;line-height:1.5}
    .qr-link{display:inline-block;cursor:pointer;text-decoration:none}
    .qr-container{background:#fff;border-radius:12px;padding:12px;display:inline-block;transition:transform .2s,box-shadow .2s}
    .qr-link:hover .qr-container{transform:scale(1.04);box-shadow:0 0 24px 4px rgba(226,75,74,.35)}
    .qr-caption{margin-top:.9rem;font-size:12px;font-family:'Space Mono',monospace;color:#4a5e7a}
    .qr-caption span{color:#e24b4a}
    .kaspersky-desc{margin-top:1rem;font-size:12px;color:#4a5e7a;line-height:1.6;border-top:1px solid #1e3a5f;padding-top:1rem}

    /* SETUP GUIDE */
    .setup-guide{background:#0d1a30;border:1px solid #f5a623;border-radius:16px;padding:1.5rem;position:relative;z-index:2;margin-bottom:1.25rem}
    .setup-guide::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0;background:#f5a623}
    .setup-title{font-size:13px;font-weight:700;color:#f5a623;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
    .setup-step{display:flex;gap:12px;margin-bottom:.85rem;align-items:flex-start}
    .step-num{background:#f5a623;color:#001f1a;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .step-text{font-size:13px;color:#c0cee0;line-height:1.55}
    .step-text a{color:#f5a623;text-decoration:none}
    .step-text a:hover{text-decoration:underline}
    .code-block{background:#0a0f1e;border:1px solid #1e3a5f;border-radius:8px;padding:.75rem 1rem;margin:.5rem 0;font-family:'Space Mono',monospace;font-size:11px;color:#00c896;line-height:1.6;white-space:pre-wrap;word-break:break-all;cursor:pointer;transition:border-color .2s}
    .code-block:hover{border-color:#00c896}
    .code-hint{font-size:11px;color:#4a5e7a;margin-top:.25rem}

    @media(max-width:480px){
      .survey-wrap{padding:1.5rem 1rem 3rem}
      .card{padding:1.5rem 1.2rem}
      .q-text{font-size:16px}
      .action-row{flex-direction:column}
    }
  </style>
</head>
<body>
<div class="survey-wrap">
  <div class="grid-bg"></div>
  <div class="scan-line"></div>

  <header class="header">
    <div class="badge-pill">[ indagine digitale ]</div>
    <h1>Quanto sei al sicuro<br><span>online?</span></h1>
    <p class="subtitle">10 domande sulle tue abitudini digitali per valutare il tuo livello di protezione dagli hacker.</p>
  </header>

  <div class="progress-bar-wrap" id="progress-section">
    <div class="progress-meta">
      <span id="prog-label">Domanda 1 di 10</span>
      <span id="prog-pct">10%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>
  </div>

  <main id="question-area"></main>
</div>

<div class="toast success" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   BACKEND CONFIG
   Incolla qui l'URL del tuo Google Apps Script dopo averlo
   deployato seguendo la guida che appare sotto i risultati.
═══════════════════════════════════════════════════════ */
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxDMOlk65nhtsDB5Xh1R03E79BbIB84VgxftXjGFIzgMJ761Gbz1Ewf1O8M_vKKOLeljg/exec';

/* ═══════════════════════════════════════════════════════
   GOOGLE APPS SCRIPT DA INCOLLARE
   (mostrato nella guida a fondo pagina)
═══════════════════════════════════════════════════════ */
const GAS_CODE = `function doGet(e) {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName('scores') 
                || SpreadsheetApp.getActiveSpreadsheet().insertSheet('scores');
  const action = e.parameter.action;

  if (action === 'save') {
    sheet.appendRow([new Date(), Number(e.parameter.score)]);
    return ContentService.createTextOutput(JSON.stringify({ok:true}))
      .setMimeType(ContentService.MimeType.JSON);
  }

  if (action === 'stats') {
    const data = sheet.getDataRange().getValues().slice(1);
    const scores = data.map(r => Number(r[1])).filter(x => x > 0);
    if (!scores.length) return ContentService.createTextOutput(
      JSON.stringify({avg:50, total:0})).setMimeType(ContentService.MimeType.JSON);
    const avg = Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
    return ContentService.createTextOutput(JSON.stringify({avg, total: scores.length}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;

/* ═══════════════════════════════════════════════════════
   DOMANDE
═══════════════════════════════════════════════════════ */
const questions=[
  {icon:"🔑",text:"Come gestisci le tue password?",category:"Password",
   options:[{text:"Uso un password manager con password uniche per ogni sito",score:10},{text:"Ho password diverse ma le tengo a memoria o su un file",score:6},{text:"Uso la stessa password o varianti simili su più siti",score:2},{text:"Uso sempre la stessa password ovunque",score:0}]},
  {icon:"📱",text:"Usi l'autenticazione a due fattori (2FA)?",category:"Autenticazione",
   options:[{text:"Sì, su tutti gli account importanti con app authenticator",score:10},{text:"Sì, ma solo con SMS su alcuni account",score:6},{text:"L'ho impostata solo su qualche account",score:3},{text:"No, non la uso mai",score:0}]},
  {icon:"📡",text:"Come ti comporti con le reti Wi-Fi pubbliche?",category:"Reti",
   options:[{text:"Non mi connetto mai o uso sempre una VPN",score:10},{text:"Mi connetto ma evito operazioni sensibili",score:5},{text:"Mi connetto e uso i servizi normalmente",score:2},{text:"Mi connetto a qualsiasi rete senza pensarci",score:0}]},
  {icon:"📧",text:"Come reagisci alle email sospette?",category:"Phishing",
   options:[{text:"Controllo mittente, link e segnalo come phishing se sospetto",score:10},{text:"Le ignoro e le cancello senza aprire allegati",score:7},{text:"Le apro ma cerco di non cliccare link strani",score:3},{text:"Clicco se sembra urgente o interessante",score:0}]},
  {icon:"🔄",text:"Con quale frequenza aggiorni i tuoi dispositivi?",category:"Aggiornamenti",
   options:[{text:"Aggiorno subito non appena escono gli aggiornamenti",score:10},{text:"Aggiorno periodicamente, qualche volta a settimana",score:7},{text:"Aggiorno raramente, solo quando necessario",score:3},{text:"Non aggiorno quasi mai",score:0}]},
  {icon:"🛡️",text:"Hai un antivirus o software di sicurezza attivo?",category:"Protezione",
   options:[{text:"Sì, con protezione in tempo reale e aggiornato",score:10},{text:"Sì, ma lo aggiorno raramente",score:5},{text:"Solo quello integrato nel sistema operativo",score:4},{text:"No, non ho nessun antivirus",score:0}]},
  {icon:"☁️",text:"Come gestisci i backup dei tuoi dati importanti?",category:"Backup",
   options:[{text:"Backup automatici su cloud + copia offline regolare",score:10},{text:"Backup occasionale su cloud o disco esterno",score:6},{text:"Backup molto raro, solo per i file più importanti",score:2},{text:"Non faccio mai backup",score:0}]},
  {icon:"🔒",text:"Controlli le autorizzazioni delle app che installi?",category:"Privacy",
   options:[{text:"Sì, leggo sempre e nego le autorizzazioni non necessarie",score:10},{text:"A volte le controllo per le app più importanti",score:6},{text:"Di solito accetto tutto per comodità",score:2},{text:"Non sapevo si potessero controllare",score:0}]},
  {icon:"🌐",text:"Come verifichi se un sito è sicuro prima di inserire dati?",category:"Navigazione",
   options:[{text:"Controllo HTTPS, certificato e URL con attenzione",score:10},{text:"Guardo se c'è il lucchetto nella barra indirizzi",score:6},{text:"Se il sito sembra professionale lo uso",score:2},{text:"Non ci faccio caso",score:0}]},
  {icon:"📲",text:"Cosa fai quando ricevi un link da un amico sui social?",category:"Social",
   options:[{text:"Verifico prima l'URL e la fonte, poi decido se aprire",score:10},{text:"Lo apro ma sono cauto se chiede dati personali",score:6},{text:"Di solito lo apro senza troppi controlli",score:2},{text:"Clicco sempre, mi fido dei miei contatti",score:0}]}
];
const catIcons={Password:"🔑",Autenticazione:"📱",Reti:"📡",Phishing:"📧",Aggiornamenti:"🔄",Protezione:"🛡️",Backup:"☁️",Privacy:"🔒",Navigazione:"🌐",Social:"📲"};
const categories={};
questions.forEach(q=>{categories[q.category]={max:10,score:0}});
let current=0,answers=new Array(questions.length).fill(null);

/* ── BACKEND ── */
async function backendSave(pct){
  if(!BACKEND_URL) return fallbackSave(pct);
  try{
    await fetch(`${BACKEND_URL}?action=save&score=${pct}`);
  }catch(e){ fallbackSave(pct); }
}
async function backendStats(myPct){
  if(!BACKEND_URL) return fallbackStats(myPct);
  try{
    const r=await fetch(`${BACKEND_URL}?action=stats`);
    const d=await r.json();
    const scores=getAllLocalScores();
    const rank=scores.length?Math.round((scores.filter(x=>x<=myPct).length/scores.length)*100):50;
    return{avg:d.avg,total:d.total,rank};
  }catch(e){ return fallbackStats(myPct); }
}

/* ── FALLBACK localStorage ── */
function fallbackSave(pct){
  try{const a=JSON.parse(localStorage.getItem('cs')||'[]');a.push(pct);if(a.length>200)a.shift();localStorage.setItem('cs',JSON.stringify(a));}catch(e){}
}
function getAllLocalScores(){
  try{return JSON.parse(localStorage.getItem('cs')||'[]');}catch(e){return[];}
}
function fallbackStats(myPct){
  const arr=getAllLocalScores();
  if(!arr.length)return{avg:myPct,total:1,rank:50};
  const avg=Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
  const rank=Math.round((arr.filter(x=>x<=myPct).length/arr.length)*100);
  return{avg,total:arr.length,rank};
}

/* ── BADGES ── */
const allBadges=[
  {id:'pw',icon:'🔑',label:'Password Master',check:c=>c.Password>=10},
  {id:'2fa',icon:'📱',label:'2FA Pro',check:c=>c.Autenticazione>=10},
  {id:'vpn',icon:'📡',label:'VPN Hero',check:c=>c.Reti>=10},
  {id:'ph',icon:'🎣',label:'Anti-Phishing',check:c=>c.Phishing>=10},
  {id:'upd',icon:'🔄',label:'Sempre Aggiornato',check:c=>c.Aggiornamenti>=10},
  {id:'sh',icon:'🛡️',label:'Scudo Digitale',check:c=>c.Protezione>=10},
  {id:'bk',icon:'☁️',label:'Backup King',check:c=>c.Backup>=10},
  {id:'pr',icon:'🔒',label:'Privacy Guard',check:c=>c.Privacy>=10},
  {id:'nb',icon:'🌐',label:'Navigatore Sicuro',check:c=>c.Navigazione>=10},
  {id:'so',icon:'📲',label:'Social Aware',check:c=>c.Social>=10},
  {id:'ex',icon:'🏆',label:'Cyber Expert',check:(c,p)=>p>=85},
  {id:'ok',icon:'⭐',label:'Utente Consapevole',check:(c,p)=>p>=60&&p<85},
];

function getLevel(pct){
  if(pct>=85)return{label:"Esperto della sicurezza",color:"#00c896",desc:"Le tue abitudini digitali sono eccellenti. Sei un utente consapevole e ben protetto. Continua così e tieniti aggiornato sulle nuove minacce."};
  if(pct>=60)return{label:"Utente consapevole",color:"#4ac8ff",desc:"Hai buone basi, ma ci sono aree da migliorare. Con qualche aggiustamento raggiungeresti un livello di protezione elevato."};
  if(pct>=35)return{label:"A rischio moderato",color:"#f5a623",desc:"Le tue abitudini ti espongono a rischi reali. Rafforzare le misure di sicurezza è urgente, specialmente per password e aggiornamenti."};
  return{label:"Vulnerabile",color:"#e24b4a",desc:"Le tue pratiche digitali ti rendono un bersaglio facile per gli hacker. Agire subito su password, 2FA e aggiornamenti è essenziale."};
}

/* ── RENDER QUESTION ── */
function renderQuestion(){
  const q=questions[current];
  const pct=Math.round(((current+1)/questions.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`Domanda ${current+1} di ${questions.length}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  const L=['A','B','C','D'];
  document.getElementById('question-area').innerHTML=`
    <div class="card">
      <div class="q-number">Domanda ${current+1} — ${q.category}</div>
      <div class="q-icon">${q.icon}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">${q.options.map((o,i)=>`
        <div class="opt ${answers[current]===i?'selected':''}" onclick="selectOpt(${i})">
          <span class="opt-letter">${L[i]}</span><span>${o.text}</span>
        </div>`).join('')}
      </div>
      <div class="nav-row">
        <button class="btn btn-back" onclick="goBack()" ${current===0?'style="visibility:hidden"':''}>← Indietro</button>
        <button class="btn btn-next" onclick="goNext()" ${answers[current]===null?'disabled':''}>
          ${current===questions.length-1?'Vedi risultati →':'Avanti →'}
        </button>
      </div>
    </div>`;
}
function selectOpt(i){answers[current]=i;categories[questions[current].category].score=questions[current].options[i].score;renderQuestion();}
function goNext(){if(answers[current]===null)return;if(current===questions.length-1)showResults();else{current++;renderQuestion();}}
function goBack(){if(current>0){current--;renderQuestion();}}

/* ── GAUGE ── */
function pctToDeg(p){return-90+(p/100)*180}
function buildGaugeSVG(pct){
  const CX=160,CY=145,R=110,IR=68,gap=2;
  const SC=['#4caf50','#8bc34a','#cddc39','#ffc107','#ff9800','#f44336','#c62828'];
  const sd=180/SC.length;
  function xy(deg,r){const a=(deg+180)*Math.PI/180;return[CX+r*Math.cos(a),CY+r*Math.sin(a)]}
  let arcs='';
  SC.forEach((c,i)=>{
    const[x1,y1]=xy(i*sd+gap/2,R),[x2,y2]=xy((i+1)*sd-gap/2,R);
    const[x3,y3]=xy((i+1)*sd-gap/2,IR),[x4,y4]=xy(i*sd+gap/2,IR);
    arcs+=`<path d="M${x1},${y1} A${R},${R} 0 0,1 ${x2},${y2} L${x3},${y3} A${IR},${IR} 0 0,0 ${x4},${y4}Z" fill="${c}"/>`;
  });
  const[lx,ly]=xy(4,R+18),[mx,my]=xy(90,R+18),[hx,hy]=xy(176,R+18);
  return`<svg class="gauge-svg" viewBox="0 0 320 168" xmlns="http://www.w3.org/2000/svg">
    ${arcs}<circle cx="${CX}" cy="${CY}" r="${IR-3}" fill="#111827"/>
    <text x="${lx-4}" y="${ly+4}" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#4a5e7a">BASSO</text>
    <text x="${mx}" y="${my-6}" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#4a5e7a">MEDIO</text>
    <text x="${hx+4}" y="${hy+4}" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#4a5e7a">ALTO</text>
    <g id="gneedle" style="transform-origin:${CX}px ${CY}px;transform:rotate(${pctToDeg(0)}deg)">
      <line x1="${CX}" y1="${CY-92}" x2="${CX}" y2="${CY+15}" stroke="#2a4a7a" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="${CX}" cy="${CY}" r="11" fill="#1e3a5f" stroke="#3a5a8a" stroke-width="1.5"/>
      <circle cx="${CX}" cy="${CY}" r="5" fill="#00c896"/>
    </g></svg>`;
}
function animateNeedle(pct){
  const el=document.getElementById('gneedle');if(!el)return;
  const s=pctToDeg(0),e=pctToDeg(pct),dur=1600,t0=performance.now();
  const ease=t=>1-Math.pow(1-t,4);
  const step=now=>{const t=Math.min((now-t0)/dur,1);el.style.transform=`rotate(${s+(e-s)*ease(t)}deg)`;if(t<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}

/* ── RADAR ── */
function buildRadarSVG(cs){
  const cats=Object.keys(cs),n=cats.length,CX=150,CY=150,R=105;
  const ang=i=>i*(2*Math.PI/n)-Math.PI/2;
  const pt=(i,r)=>[CX+r*Math.cos(ang(i)),CY+r*Math.sin(ang(i))];
  let rings=[.25,.5,.75,1].map(f=>`<polygon points="${cats.map((_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="#1e3a5f" stroke-width="1"/>`).join('');
  let axes=cats.map((_,i)=>{const[x,y]=pt(i,R);return`<line x1="${CX}" y1="${CY}" x2="${x}" y2="${y}" stroke="#1e3a5f" stroke-width="1"/>`;}).join('');
  const poly=cats.map((c,i)=>pt(i,R*(cs[c]/10)).join(',')).join(' ');
  const dots=cats.map((c,i)=>{const[x,y]=pt(i,R*(cs[c]/10));return`<circle cx="${x}" cy="${y}" r="4" fill="#00c896"/>`;}).join('');
  const lbls=cats.map((c,i)=>{const[x,y]=pt(i,R+22);return`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#7a8ba8">${catIcons[c]||c.slice(0,3)}</text>`;}).join('');
  return`<svg class="radar-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    ${rings}${axes}
    <polygon points="${poly}" fill="rgba(0,200,150,.15)" stroke="#00c896" stroke-width="2"/>
    ${dots}${lbls}</svg>`;
}

/* ── SHARE: usa fallback testuale, funziona ovunque ── */
function shareResult(pct,label){
  const text=`🔐 Ho completato il test di sicurezza digitale!\n\nPunteggio: ${pct}% — ${label}\n\nE tu, quanto sei al sicuro online?`;
  /* Prova Clipboard API (HTTPS) */
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text)
      .then(()=>showToast('✓ Testo copiato negli appunti!','success'))
      .catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  /* Crea textarea invisibile, seleziona, execCommand — funziona anche su file:// */
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();ta.select();
  try{
    document.execCommand('copy');
    showToast('✓ Testo copiato negli appunti!','success');
  }catch(e){
    showToast('Copia manuale: '+text.slice(0,40)+'…','error');
  }
  document.body.removeChild(ta);
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=`toast ${type}`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

/* ── PDF — attende che jsPDF sia caricato ── */
function waitForJsPDF(cb,tries=0){
  if(window.jspdf && window.jspdf.jsPDF){cb();return;}
  if(tries>20){showToast('Libreria PDF non disponibile, riprova.','error');return;}
  setTimeout(()=>waitForJsPDF(cb,tries+1),300);
}

function downloadPDF(pct,label,catScores,tipText){
  const btn=document.getElementById('pdf-btn');
  btn.disabled=true;btn.textContent='⏳ Generazione...';
  waitForJsPDF(()=>{
    try{
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:'mm',format:'a4'});
      const W=210,PH=297;let y=0;
      /* Header */
      doc.setFillColor(10,15,30);doc.rect(0,0,W,42,'F');
      doc.setTextColor(0,200,150);doc.setFontSize(20);doc.setFont('helvetica','bold');
      doc.text('REPORT SICUREZZA DIGITALE',W/2,16,{align:'center'});
      doc.setFontSize(9);doc.setTextColor(74,94,122);
      doc.text('[ indagine digitale ]',W/2,24,{align:'center'});
      doc.setFontSize(9);doc.setTextColor(122,139,168);
      doc.text(new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'}),W/2,31,{align:'center'});
      y=52;
      /* Score box */
      const lc=pct>=85?[0,200,150]:pct>=60?[74,200,255]:pct>=35?[245,166,35]:[226,75,74];
      doc.setFillColor(...lc);doc.roundedRect(15,y,W-30,28,4,4,'F');
      doc.setTextColor(0,20,15);doc.setFontSize(28);doc.setFont('helvetica','bold');
      doc.text(`${pct}%`,W/2,y+13,{align:'center'});
      doc.setFontSize(11);doc.text(label,W/2,y+22,{align:'center'});
      y+=38;
      /* Categories */
      doc.setTextColor(0,200,150);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text('DETTAGLIO PER CATEGORIA',15,y);y+=5;
      doc.setDrawColor(30,58,95);doc.line(15,y,W-15,y);y+=6;
      Object.entries(catScores).forEach(([cat,score])=>{
        const cp=Math.round((score/10)*100);
        const bc=cp>=70?[0,200,150]:cp>=40?[245,166,35]:[226,75,74];
        doc.setTextColor(192,206,224);doc.setFontSize(9);doc.setFont('helvetica','normal');
        doc.text(`${catIcons[cat]||''} ${cat}`,18,y);
        doc.setTextColor(...bc);doc.setFont('helvetica','bold');
        doc.text(`${cp}%`,W-18,y,{align:'right'});
        y+=3;
        doc.setFillColor(26,37,64);doc.roundedRect(18,y,W-36,3,1,1,'F');
        doc.setFillColor(...bc);
        const bw=Math.max(1,(W-36)*cp/100);
        doc.roundedRect(18,y,bw,3,1,1,'F');
        y+=8;
        if(y>PH-40){doc.addPage();doc.setFillColor(10,15,30);doc.rect(0,0,W,8,'F');y=15;}
      });
      y+=4;
      /* Tip */
      const tLines=doc.splitTextToSize(tipText,W-42);
      const th=tLines.length*5+14;
      doc.setFillColor(0,31,26);doc.roundedRect(15,y,W-30,th,3,3,'F');
      doc.setDrawColor(0,200,150);doc.roundedRect(15,y,W-30,th,3,3,'S');
      doc.setTextColor(0,200,150);doc.setFontSize(8);doc.setFont('helvetica','bold');
      doc.text('CONSIGLIO PRIORITARIO',20,y+7);
      doc.setTextColor(160,196,176);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
      doc.text(tLines,20,y+14);
      y+=th+8;
      /* Footer */
      doc.setFillColor(10,15,30);doc.rect(0,PH-14,W,14,'F');
      doc.setTextColor(74,94,122);doc.setFontSize(7);
      doc.text('Generato da Sondaggio Sicurezza Digitale  •  cybermap.kaspersky.com',W/2,PH-6,{align:'center'});
      doc.save(`report-sicurezza-${pct}pct.pdf`);
      showToast('✓ PDF scaricato!','success');
    }catch(err){
      showToast('Errore nella generazione PDF.','error');
      console.error(err);
    }
    btn.disabled=false;btn.textContent='📄 Scarica report PDF';
  });
}

/* ── SHOW RESULTS ── */
async function showResults(){
  document.getElementById('progress-section').style.display='none';
  const totalMax=questions.length*10;
  const totalScore=answers.reduce((s,a,i)=>s+(a!==null?questions[i].options[a].score:0),0);
  const pct=Math.round((totalScore/totalMax)*100);
  const level=getLevel(pct);
  const catScores={};
  Object.entries(categories).forEach(([cat,v])=>{catScores[cat]=v.score;});
  const earnedBadges=allBadges.filter(b=>b.check(catScores,pct));
  const catEntries=Object.entries(categories);
  const tips={
    low:"Inizia subito: installa un password manager, attiva il 2FA sulle email e sul banking, e abilita gli aggiornamenti automatici.",
    mid:"Passi chiave: usa una VPN sulle reti pubbliche, controlla le autorizzazioni delle app e fai un backup settimanale.",
    high:"Sei sulla buona strada! Considera di usare un browser con privacy avanzata e di monitorare eventuali data breach del tuo indirizzo email."
  };
  const tipText=pct<40?tips.low:pct<70?tips.mid:tips.high;

  /* Salva e recupera stats (async) */
  backendSave(pct);
  const stats=await backendStats(pct);
  const rankEmoji=stats.rank>=80?'🏆':stats.rank>=60?'⭐':stats.rank>=40?'📊':'💡';
  const rankMsg=stats.rank>=80?`Sei nel top ${100-stats.rank}% degli utenti!`:stats.rank>=50?`Sei sopra la media degli utenti.`:`Hai margine di miglioramento rispetto alla media.`;
  const backendActive=!!BACKEND_URL;

  document.getElementById('question-area').innerHTML=`
    <div class="result-wrap">
      <div class="result-card" style="--level-color:${level.color}">

        <div class="gauge-wrap">${buildGaugeSVG(pct)}</div>
        <div class="gauge-center-label">
          <div class="gauge-pct-num" style="color:${level.color}">${pct}%</div>
          <div class="gauge-level-label" style="color:${level.color}">${level.label}</div>
        </div>
        <p class="result-desc">${level.desc}</p>

        <!-- RANKING -->
        <div class="ranking-banner">
          <div class="ranking-icon">${rankEmoji}</div>
          <div class="ranking-text">
            <div class="ranking-title">${rankMsg}</div>
            <div class="ranking-sub">
              Media: ${stats.avg}% · ${stats.total} compilazioni
              ${backendActive?'<span style="color:#00c896;margin-left:6px">● live</span>':'<span style="color:#4a5e7a;margin-left:6px">(locale)</span>'}
            </div>
          </div>
          <div class="ranking-pct" style="color:${level.color}">${stats.rank}°%</div>
        </div>

        <!-- BADGES -->
        <div class="badges-section">
          <div class="section-label">[ achievement: ${earnedBadges.length}/${allBadges.length} sbloccati ]</div>
          <div class="badges-grid">
            ${allBadges.map(b=>{
              const e=earnedBadges.some(x=>x.id===b.id);
              return`<div class="badge-item ${e?'earned':''}"><span class="badge-icon">${b.icon}</span><span>${b.label}</span></div>`;
            }).join('')}
          </div>
        </div>

        <!-- RADAR -->
        <div class="radar-section">
          <div class="section-label">[ grafico a ragnatela ]</div>
          <div class="radar-wrap">${buildRadarSVG(catScores)}</div>
        </div>

        <!-- ACCORDION -->
        <div class="accordion" id="acc">
          <button class="accordion-trigger" onclick="toggleAccordion()">
            <span class="accordion-trigger-left"><span style="font-size:16px">📊</span><span>Dettaglio per categoria</span></span>
            <span class="acc-chevron"></span>
          </button>
          <div class="accordion-body">
            <div class="accordion-inner">
              ${catEntries.map(([cat,v],idx)=>{
                const cp=Math.round((v.score/v.max)*100);
                const bc=cp>=70?'#00c896':cp>=40?'#f5a623':'#e24b4a';
                return`<div class="breakdown-item">
                  <div class="breakdown-top"><span>${catIcons[cat]||''} ${cat}</span><span class="breakdown-score-txt" style="color:${bc}">${cp}%</span></div>
                  <div class="breakdown-bar-track"><div class="breakdown-bar-fill" id="bar-${idx}" style="background:${bc}" data-pct="${cp}"></div></div>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>

        <!-- TIP -->
        <div class="tip-box">
          <div class="tip-label">[ consiglio prioritario ]</div>
          <div class="tip-text">${tipText}</div>
        </div>

        <!-- ACTIONS -->
        <div class="action-row">
          <button class="action-btn" onclick="shareResult(${pct},'${level.label}')">📤 Condividi</button>
          <button class="action-btn" id="pdf-btn" onclick="downloadPDF(${pct},'${level.label}',${JSON.stringify(catScores).replace(/"/g,"'").replace(/'/g,'"')},'${tipText.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">📄 Scarica PDF</button>
          <button class="action-btn primary" onclick="restart()">↺ Ricomincia</button>
        </div>

      <!-- KASPERSKY -->
      <div class="kaspersky-box">
        <div class="kaspersky-header"><div class="kaspersky-dot"></div><div class="kaspersky-title">Mappa attacchi in tempo reale</div><div class="kaspersky-dot"></div></div>
        <p class="kaspersky-sub">Kaspersky Cybermap — minacce globali live</p>
        <a class="qr-link" href="https://cybermap.kaspersky.com" target="_blank" rel="noopener">
          <div class="qr-container" id="qr-code"></div>
        </a>
        <div class="qr-caption"><span>↑ clicca</span> per aprire · oppure inquadra con il telefono</div>
        <div class="kaspersky-desc">Visualizza in tempo reale gli attacchi informatici in corso nel mondo: malware, intrusioni, exploit e molto altro, suddivisi per paese e tipologia.</div>
      </div>

      <!-- SETUP GUIDE (visibile solo se backend non configurato) -->
      ${!backendActive?`

        </div>

        <div class="setup-step">
          <div class="step-num">2</div>
          <div class="step-text">Clicca su <strong>Estensioni → Apps Script</strong>, cancella tutto e incolla questo codice. Poi clicca 💾 Salva.</div>
        </div>
        <div class="code-block" onclick="copyCode(this)" title="Clicca per copiare">${GAS_CODE.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="code-hint">↑ clicca per copiare il codice</div>

        <div class="setup-step" style="margin-top:.75rem">
          <div class="step-num">3</div>
          <div class="step-text">Clicca <strong>Distribuisci → Nuova distribuzione</strong> → tipo <strong>App web</strong> → "Chiunque" può accedere → <strong>Distribuisci</strong>. Copia l'URL che appare.</div>
        </div>

        <div class="setup-step">
          <div class="step-num">4</div>
          <div class="step-text">Apri questo file HTML con un editor di testo e sostituisci la riga:<br>
            <code style="color:#00c896;font-size:11px">const BACKEND_URL = '';</code><br>
            con:<br>
            <code style="color:#00c896;font-size:11px">const BACKEND_URL = 'https://script.google.com/macros/s/TUO_ID/exec';</code>
          </div>
        </div>

        <div class="setup-step">
          <div class="step-num">5</div>
          <div class="step-text">Fatto! I punteggi verranno salvati nel tuo Google Sheet e la media sarà reale tra tutti gli utenti. <span style="color:#00c896">Il badge "● live" apparirà nel banner classifica.</span></div>
        </div>
      </div>`:''}
    </div>`;

  requestAnimationFrame(()=>{
    animateNeedle(pct);
    if(typeof QRCode!=='undefined'){
      new QRCode(document.getElementById('qr-code'),{
        text:'https://cybermap.kaspersky.com',width:150,height:150,
        colorDark:'#0a0f1e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H
      });
    }
  });
}

function toggleAccordion(){
  const acc=document.getElementById('acc');
  const was=acc.classList.contains('open');
  acc.classList.toggle('open');
  if(!was)acc.querySelectorAll('.breakdown-bar-fill').forEach((b,i)=>setTimeout(()=>{b.style.width=b.dataset.pct+'%';},i*70));
}

function copyCode(el){
  const text=el.textContent;
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>showToast('✓ Codice copiato!','success'));
  } else {
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('✓ Codice copiato!','success');
  }
}

function restart(){
  current=0;answers=new Array(questions.length).fill(null);
  Object.keys(categories).forEach(k=>{categories[k].score=0;});
  document.getElementById('progress-section').style.display='block';
  renderQuestion();
}

renderQuestion();
</script>
